version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: supervision-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: supervision
      POSTGRES_USER: supervision
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../postgres_data:/var/lib/postgresql/data
    networks:
      - supervision-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supervision -d supervision"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/lichncjx/supervision-system-migrate:latest
    container_name: supervision-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://supervision:${POSTGRES_PASSWORD}@db:5432/supervision?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supervision-net

  app:
    image: ghcr.io/lichncjx/supervision-system:latest
    container_name: supervision-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://supervision:${POSTGRES_PASSWORD}@db:5432/supervision?schema=public
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    volumes:
      - ../uploads:/app/uploads
    ports:
      - "18080:5000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - supervision-net

networks:
  supervision-net:
    driver: bridge