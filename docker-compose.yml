services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: source
    container_name: supervision-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/supervision
      JWT_SECRET: supervision-jwt-secret-key
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm prisma migrate deploy && pnpm prisma db seed"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supervision-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://postgres:password@db:5432/supervision
      JWT_SECRET: supervision-jwt-secret-key
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./uploads:/app/uploads

  db:
    image: postgres:16-alpine
    container_name: supervision-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: supervision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supervision"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: supervision-nginx
    restart: unless-stopped
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./uploads:/app/uploads
    depends_on:
      - app

volumes:
  postgres_data:
