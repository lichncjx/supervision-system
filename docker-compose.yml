services:
  db:
    image: postgres:16-alpine
    container_name: supervision-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: supervision
      POSTGRES_USER: supervision
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supervision -d supervision"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - supervision-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supervision-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://supervision:${POSTGRES_PASSWORD}@db:5432/supervision?schema=public
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - supervision-net

  nginx:
    image: nginx:alpine
    container_name: supervision-nginx
    restart: unless-stopped
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./uploads:/app/uploads
    depends_on:
      - app
    networks:
      - supervision-net

networks:
  supervision-net:
    driver: bridge

volumes:
  postgres_data:
