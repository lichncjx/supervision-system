name: Build and Publish Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build app image
        run: |
          docker build \
            --target app \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            .

      - name: Push app image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Build migrate image
        run: |
          docker build \
            --target migrate \
            -t ${IMAGE_NAME}-migrate:latest \
            -t ${IMAGE_NAME}-migrate:${{ github.sha }} \
            .

      - name: Push migrate image
        run: |
          docker push ${IMAGE_NAME}-migrate:latest
          docker push ${IMAGE_NAME}-migrate:${{ github.sha }}

      - name: Show image sizes
        run: docker images | grep supervision-system